<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henri´s Pizzeria</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">


    <style>
        body {
            margin: 0;
            font-family: "Shadows Into Light", cursive;
        }
        
        .header-image {
            height: 100vh;
            width: 100%;
            object-fit: cover;
        }
        
        .container {
            position: absolute;
            right: 40px;
            left: 30px;
            top: 20px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .menu-link {
            color: rgb(251, 118, 3);
            text-decoration: none;
            margin-left: 20px;
        }
        
        .menu-link:hover {
            text-decoration: underline;
        }
        
        .logo {
            position: absolute;
            left: 30px;
            top: 30px;
        }
        
        .headline {
            position: absolute;
            left: 100px;
            top: 225px;
            color: rgb(192, 76, 4);
            font-size: 60px;
        }
    </style>
</head>

<body>


    <img src="pizza-background.jpg" class="header-image">
    <div class="container">
        <img src="logo-pizza.png">
        <div>
            <a class="menu-link" href="">Home</a>
            <a class="menu-link" href="">Kontakt</a>
            <a class="menu-link" href="">Anruf</a>
            <a class="menu-link" href="">Bewertung</a>
            <a class="menu-link" href="">Menü</a>
        </div>
    </div>

    <h1 class="headline">Die NUMERO UNO Pizzeria in München</h1>


</body>

</html>
